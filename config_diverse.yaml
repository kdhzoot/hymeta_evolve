# OpenEvolve config for short, diversity-oriented HyMeta policy search.
#
# Use this when the goal is to collect materially different policy families
# rather than squeeze the last 0.1% from the current best program.

max_iterations: 250
checkpoint_interval: 50
log_level: INFO
random_seed: 31415
language: cpp
file_suffix: .cpp

llm:
  # Local or SSH-forwarded vLLM endpoint.
  api_base: "http://localhost:8001/v1"
  api_key: "local-vllm"
  primary_model: "Qwen/Qwen3-Coder-Next"
  primary_model_weight: 1.0
  # Higher entropy than config.yaml (0.8) to avoid tiny threshold-only edits.
  temperature: 1.0
  top_p: 0.95
  max_tokens: 4096
  timeout: 60
  retries: 3

prompt:
  # Keep fewer elites in context and show more non-best programs.
  num_top_programs: 2
  num_diverse_programs: 6
  include_artifacts: true
  use_template_stochasticity: true

database:
  in_memory: true
  log_prompts: true

  # With only 250 evaluations, retain most candidates so weak-but-novel
  # branches are not immediately pruned.
  population_size: 180
  archive_size: 90

  # More islands plus low migration keeps strategy families separated.
  num_islands: 6
  migration_interval: 40
  migration_rate: 0.05

  # Parent sampling: 55% random island exploration, 30% archive exploitation,
  # 15% fully random fallback.
  elite_selection_ratio: 0.05
  exploration_ratio: 0.55
  exploitation_ratio: 0.30

  # Preserve a broader MAP-Elites grid, including score as a third axis so
  # "weird but promising" policies and high-score policies both survive.
  feature_dimensions:
    - complexity
    - diversity
    - score
  feature_bins:
    complexity: 8
    diversity: 12
    score: 8
  diversity_reference_size: 40

evaluator:
  cascade_evaluation: false

# Suggested run:
#   scripts/evolve_diverse.sh
#
# Override when needed:
#   ITERATIONS=120 OUTPUT=evolve_runs_diverse_probe scripts/evolve_diverse.sh
